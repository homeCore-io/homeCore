name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# The default workflow token is read-only, and a called workflow can never hold
# more than its caller. rust-ci.yml opens/closes a tracking issue when develop
# goes red, so without issues:write granted here the whole run fails at startup
# with no jobs and no annotation.
permissions:
  contents: read
  issues: write

jobs:
  ci:
    # No rust_version override — take rust-ci.yml's pinned default so CI
    # compiles with the same toolchain that ships (the Dockerfiles pin
    # rust:1.95-alpine by digest). Tracking "stable" here gated merges on a
    # compiler we never ship with, and turned CI red on Rust release day with
    # no code change. Bump the pin in hc-scripts deliberately.
    uses: homeCore-io/hc-scripts/.github/workflows/rust-ci.yml@main

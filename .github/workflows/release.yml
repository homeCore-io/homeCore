name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Required for the reusable workflow's release job to create a GitHub
# Release on tag push. Repo default is read-only.
permissions:
  contents: write

jobs:
  release:
    uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
    with:
      binary_name: homecore
      config_example: config/homecore.toml.example
      extra_files: |
        config/profiles
        scripts/service-templates/homecore.service
      rust_version: "stable"

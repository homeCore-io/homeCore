name: Release

on:
  push:
    branches: [develop]
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - '.github/dependabot.yml'
  workflow_dispatch:
    inputs:
      fast:
        description: "Skip aarch64 to halve runtime (use for dev iteration; tag pushes always go multi-arch)."
        type: boolean
        default: true
  # Fired by hc-web-leptos's CI when develop is green, so a leptos-only
  # change rebuilds hc-core:dev with the new WASM bundled. Without this
  # the dev appliance carries stale UI until a separate core commit lands.
  repository_dispatch:
    types: [webui-updated]

# contents: write — reusable workflow's release job creates a GH Release.
# packages: write — reusable workflow's docker-publish job pushes to ghcr.io.
permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
    # Inherit org-level secrets (CROSS_REPO_DISPATCH_PAT etc.) so the
    # reusable workflow's dispatch-appliance job can cascade to the
    # docker repo on develop pushes.
    secrets: inherit
    with:
      binary_name: homecore
      config_example: config/homecore.toml.example
      extra_files: |
        config/profiles
        scripts/service-templates/homecore.service
      rust_version: "stable"
      # Docker image: hc-core (binary is "homecore", image name diverges).
      publish_docker_image: true
      image_name: hc-core
      dockerfile_name: Dockerfile.core
      bundle_webui: true
      # The web UI is not built by its own repo — it is cloned and built here,
      # so whatever ref this names is what ends up inside the image.
      #
      # On a tag push, pin it to the identical tag: hc-web-leptos is versioned in
      # lockstep with core (both carry v0.1.3/4/5), so v0.1.6 of core bundles
      # v0.1.6 of the UI. Without this a *released* image bundled whatever
      # hc-web-leptos@develop happened to be at that instant, which meant the
      # image could not be rebuilt from core's tag — the UI inside it was
      # unrecorded. Rebuilding v0.1.5 today would quietly produce a different
      # artifact than v0.1.5 did.
      #
      # Everything else (develop pushes, workflow_dispatch, the webui-updated
      # dispatch) keeps tracking develop, which is the point of a dev image.
      #
      # This makes the ordering explicit: tag hc-web-leptos before tagging core.
      # If the matching tag is missing the release fails at checkout rather than
      # silently falling back to develop — a release that bundles an unrecorded
      # UI is the thing this exists to prevent.
      webui_ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'develop' }}
      docker_repo_ref: develop  # while homeCore-io/docker still on develop
      # Forwards the workflow_dispatch input to the reusable workflow.
      # On tag push (no inputs), the `|| false` fallback ensures
      # full multi-arch — the reusable defaults `fast` to false too,
      # but expression-context yields '' for an undefined input which
      # the boolean coerces, so we're explicit here.
      fast: ${{ inputs.fast || false }}
      # Tag-push-only: assemble homecore-appliance-<tag>-<platform>.tar.gz
      # by downloading each plugin's matching release from its own repo
      # and merging into a single archive. Every plugin in the list must
      # have a release tagged the same as core's tag for assembly to
      # succeed.
      assemble_appliance: true
      appliance_plugins: |
        hc-hue
        hc-yolink
        hc-lutron
        hc-caseta
        hc-sonos
        hc-ecowitt
        hc-zwave
        hc-isy
        hc-wled
        hc-thermostat

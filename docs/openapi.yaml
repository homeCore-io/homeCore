  # ---------------------------------------------------------------------------
  # Events
  # ---------------------------------------------------------------------------
  /events:
    get:
      operationId: listEvents
      summary: Query the recent event log (last 1,000 events, MqttMessage excluded)
      tags: [events]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum entries to return (default 50, max 1000)
          schema:
            type: integer
            default: 50
            maximum: 1000
        - name: type
          in: query
          description: Comma-separated event type names to include (e.g. `rule_fired,device_state_changed`)
          schema:
            type: string
        - name: device_id
          in: query
          description: Only return events for this device ID
          schema:
            type: string
      responses:
        "200":
          description: Array of log entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

  /events/stream:
    get:
      operationId: streamEvents
      summary: Live WebSocket event stream
      tags: [events]
      description: |
        Upgrade to WebSocket.  Each message is a JSON-encoded event object.

        **Authentication:** pass the JWT as `?token=<jwt>` — browsers cannot
        set `Authorization` headers during a WebSocket upgrade.  The server
        validates the token before accepting the upgrade and returns HTTP 401
        if it is missing or invalid.

        **Filtering (optional):**
        - `type` — comma-separated event type names (e.g. `device_state_changed,rule_fired`)
        - `device_id` — only forward events for this device

        **Event types:** `device_state_changed`, `device_availability_changed`,
        `rule_fired`, `scene_activated`, `plugin_registered`, `plugin_offline`,
        `system_alert`, `custom`
      parameters:
        - name: token
          in: query
          required: true
          description: JWT — required because browsers cannot set Authorization headers for WebSocket
          schema:
            type: string
        - name: type
          in: query
          description: Comma-separated event type names to subscribe to
          schema:
            type: string
        - name: device_id
          in: query
          description: Only forward events for this device ID
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols — WebSocket upgrade accepted
        "401":
          description: Missing or invalid token — upgrade rejected

  # ---------------------------------------------------------------------------
  # Plugins
  # ---------------------------------------------------------------------------
  /plugins:
    get:
      operationId: listPlugins
      summary: List registered plugins and their status
      tags: [plugins]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of plugin status objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginStatus"

  /plugins/{id}:
    delete:
      operationId: deregisterPlugin
      summary: Deregister a plugin (removes from in-memory registry)
      tags: [plugins]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PluginId"
      responses:
        "204":
          description: Plugin deregistered
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: getPlugin
      summary: Get a single plugin's registration and health
      description: |
        Returns the plugin's registration record — status, heartbeat, restart
        count, version, `device_count`, and its capability manifest if it has
        published one.

        `device_count` is the number of devices the plugin itself believes it
        manages. Comparing it against how many devices homeCore holds for the
        plugin is how orphaned devices are found — see
        `GET /devices/orphaned`.

        Requires the `plugins:read` scope.
      tags: [plugins]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PluginId"
      responses:
        "200":
          description: Plugin registration record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchPlugin
      summary: Enable/disable a plugin or change its log level
      description: |
        Both fields are optional; send either or both.

        `enabled` is persisted to `homecore.toml`, so it survives a restart, and
        the supervisor starts or stops the plugin process to match. `log_level`
        is pushed to the running plugin over the management channel and is **not**
        persisted — it reverts on restart.

        Both changes are written to the audit log.

        Requires the `plugins:write` scope.
      tags: [plugins]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PluginId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: Persisted to homecore.toml; starts or stops the plugin process.
                log_level:
                  type: string
                  description: Pushed to the live plugin. Not persisted.
                  examples: ["debug"]
      responses:
        "200":
          description: The updated plugin record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"


openapi: "3.1.0"

info:
  title: HomeCore API
  version: "0.1.5"
  description: |
    HomeCore home automation platform REST + WebSocket API.
    All endpoints are under `/api/v1/`.

    **Authentication.** Most endpoints require a `Bearer` JWT in the
    `Authorization` header. An API key (`POST /auth/api-keys`) may be used in
    its place. WebSocket endpoints (`/events/stream`, `/logs/stream`) take the
    token as a `?token=` query parameter instead, because browsers cannot set
    headers during a WebSocket upgrade.

    Public — no credential at all: `POST /auth/login`, `POST /auth/refresh`,
    `GET /health`, `GET /system/versions`, and `GET /metrics`. `/metrics` is
    instead gated on source IP via `[metrics].whitelist`, which is **empty by
    default**, so every caller gets `403` until it is configured.

    A local-network IP whitelist (`[auth].whitelist`) can bypass authentication
    entirely; a Bearer token always takes priority when one is present.

    **Authorization** is by scope, not role. Handlers declare a required scope
    such as `devices:read` or `automations:write`, and roles map onto sets of
    scopes — so "which role can call this" is a property of the scope, and each
    operation below names the scope it needs. A few endpoints instead check for
    the admin role directly; those say so.
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: auth
    description: Login, user profile, and user management (admin only)
  - name: devices
    description: Device registry and state control
  - name: areas
    description: Room and zone management
  - name: automations
    description: Automation rule CRUD, dry-run, import/export
  - name: scenes
    description: Named state snapshots
  - name: events
    description: Event log (REST) and live stream (WebSocket)
  - name: plugins
    description: Plugin registration and health
  - name: webhooks
    description: Inbound webhook triggers for automations
  - name: dashboards
    description: Dashboard definitions, templates, and per-user defaults
  - name: system
    description: |
      Health, status, versions, config, backup/restore, logs, metrics,
      WebSocket connections, and the audit log.

# =============================================================================
# Paths
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /auth/login:
    post:
      operationId: login
      summary: Log in and receive a JWT
      description: Public endpoint — no token required.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: admin
              password: my-secret-password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      operationId: getMe
      summary: Get the authenticated user's profile
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/change-password:
    post:
      operationId: changePassword
      summary: Change your own password
      tags: [auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: New password too short (minimum 8 characters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/users:
    get:
      operationId: listUsers
      summary: List all users (admin only)
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of user profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createUser
      summary: Create a new user (admin only)
      tags: [auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/users/{id}:
    delete:
      operationId: deleteUser
      summary: Delete a user (admin only)
      tags: [auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User deleted
        "400":
          description: Cannot delete your own account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/users/{id}/role:
    patch:
      operationId: setUserRole
      summary: Change a user's role (admin only)
      tags: [auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Devices
  # ---------------------------------------------------------------------------
  /devices:
    get:
      operationId: listDevices
      summary: List all devices with current state
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: device_type
          schema:
            type: string
          description: Optional device type filter, for example `media_player`
        - in: query
          name: include_schema
          schema:
            type: boolean
          description: Include resolved device schema objects inline
      responses:
        "200":
          description: Array of device state objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceState"
    patch:
      operationId: bulkPatchDevices
      summary: Bulk update device metadata
      description: |
        Updates metadata on several devices at once. Currently the only
        supported field is `area`.
        Requires the `devices:write` scope (`DevicesWrite` guard).
        Selection is by explicit id list only — there is no filter form. `ids`
        is required; a body without an `ids` array is rejected with 422.
        Non-string elements inside `ids` are silently ignored.
        `area` is optional. Send a string to assign an area, or `null` to clear
        it. If the `area` key is omitted entirely, every listed device is
        re-saved unchanged and still counted in `updated` — no other bulk field
        is implemented yet.
        Unknown device ids are not an error: they are reported in `not_found`
        and the rest of the batch still applies.
      tags: [devices]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  description: Device IDs to update
                  items:
                    type: string
                area:
                  type: string
                  nullable: true
                  description: Area to assign to every listed device; `null` clears the area
            example:
              ids:
                - light.living_room_main
                - light.living_room_lamp
              area: living_room
      responses:
        "200":
          description: Bulk update applied
          content:
            application/json:
              schema:
                type: object
                required: [updated, not_found]
                properties:
                  updated:
                    type: integer
                    description: Number of devices successfully written
                  not_found:
                    type: array
                    description: IDs from the request that do not exist in the registry
                    items:
                      type: string
              example:
                updated: 2
                not_found: []
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: |
            `ids` array missing, or `area` is neither a string nor `null`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: bulkDeleteDevices
      summary: Bulk delete devices (cascades into rule files)
      description: |
        Deletes several devices from the registry in one call. Destructive and
        not reversible via the API.
        Requires the `devices:write` scope (`DevicesWrite` guard).
        Selection is by explicit id list only — there is no filter form. `ids`
        is required; a body without an `ids` array is rejected with 422.
        **Cascade into rules.** For every device actually deleted, HomeCore
        rewrites the rule files on disk: each direct reference to the deleted
        device in a rule's trigger, conditions, or actions is replaced with the
        placeholder `DELETED:<device_id>`, the rule's `enabled` flag is forced
        to `false`, and the rule's `error` field is set to
        `references deleted device: <device_id>`. The rewritten rule file is
        written back in place. References buried inside Rhai script strings are
        NOT rewritten. The names of every rule disabled this way are returned in
        `affected_rules` (deduplicated across the batch).
        Unknown device ids are not an error: they are reported in `not_found`
        and the rest of the batch still applies. A successful delete of one or
        more devices emits a `device.bulk_deleted` audit entry.
        Note the response reports a *count* in `deleted` — unlike single
        `DELETE /devices/{id}`, which returns `{"deleted": true, ...}`.
      tags: [devices]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  description: Device IDs to delete
                  items:
                    type: string
            example:
              ids:
                - light.living_room_main
                - sensor.old_thermostat
      responses:
        "200":
          description: Bulk delete applied, with the rule-file cascade summary
          content:
            application/json:
              schema:
                type: object
                required: [deleted, not_found, affected_rules]
                properties:
                  deleted:
                    type: integer
                    description: Number of devices removed from the registry
                  not_found:
                    type: array
                    description: IDs from the request that did not exist
                    items:
                      type: string
                  affected_rules:
                    type: array
                    description: |
                      Names of rules that referenced a deleted device. Each was
                      rewritten with a `DELETED:<device_id>` placeholder and
                      disabled.
                    items:
                      type: string
              example:
                deleted: 2
                not_found: []
                affected_rules:
                  - Evening lights
                  - Away mode
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: "`ids` array missing from the request body"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /devices/{id}:
    get:
      operationId: getDevice
      summary: Get a single device and its capability schema
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "200":
          description: Device state and schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceState"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateDevice
      summary: Update device metadata
      description: |
        Updates metadata fields such as `name`, `area`, `canonical_name`, and `status_icon`.

        `canonical_name` is the stable, rule-facing identifier used by HomeCore
        for readable automations. It must be unique across the hub after
        normalization.
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                area:
                  type: string
                  nullable: true
                canonical_name:
                  type: string
                  nullable: true
                status_icon:
                  type: string
                  nullable: true
            example:
              name: Floor Lamp
              area: living_room
              canonical_name: living_room.floor_lamp
              status_icon: lightbulb
      responses:
        "200":
          description: Updated device state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceState"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDevice
      summary: Delete a device (cascades into automations)
      description: |
        Removes the device from the registry.

        **This cascades into rule files.** Every automation that references the
        device has the reference rewritten to `DELETED:{device_id}`, is set
        `enabled: false`, and gets `error: "references deleted device: {id}"`.
        The RON file is rewritten in place. References inside Rhai script strings
        are *not* rewritten. The names of the rules touched come back in
        `affected_rules`, so check it before assuming the delete was harmless —
        an empty list means no automation was disturbed.

        Note the shape differs from bulk delete: this returns `deleted: true`
        (boolean), whereas `DELETE /devices` returns `deleted: <count>`.

        Requires the `devices:write` scope.
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "200":
          description: Device deleted; any automations it broke are listed
          content:
            application/json:
              schema:
                type: object
                required: [deleted, affected_rules]
                properties:
                  deleted:
                    type: boolean
                    examples: [true]
                  affected_rules:
                    type: array
                    description: Names of automations disabled by this delete. Empty when none referenced it.
                    items:
                      type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          description: Device store or rule-file store failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /devices/{id}/state:
    patch:
      operationId: commandDevice
      summary: Send a command to a device (publishes to MQTT cmd topic)
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial attribute map to apply
              additionalProperties: true
            example:
              on: true
              brightness: 180
      responses:
        "202":
          description: Command accepted and published to MQTT
        "404":
          $ref: "#/components/responses/NotFound"

  /devices/{id}/history:
    get:
      operationId: getDeviceHistory
      summary: Query time-series state history
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DeviceId"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: Array of historical state snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  # ---------------------------------------------------------------------------
  # Areas
  # ---------------------------------------------------------------------------
  /areas:
    get:
      operationId: listAreas
      summary: List all areas
      tags: [areas]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Area"
    post:
      operationId: createArea
      summary: Create a new area
      tags: [areas]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaCreate"
      responses:
        "201":
          description: Created area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Area"

  /areas/{id}:
    patch:
      operationId: patchArea
      summary: Rename an area
      tags: [areas]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AreaId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AreaCreate"
      responses:
        "200":
          description: Updated area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Area"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteArea
      summary: Delete an area and clear it from member devices
      tags: [areas]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AreaId"
      responses:
        "204":
          description: Area deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /areas/{id}/devices:
    put:
      operationId: setAreaDevices
      summary: Assign devices to an area (replaces existing assignment)
      tags: [areas]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AreaId"
      requestBody:
        required: true
        description: JSON array of device IDs to assign to this area
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
            example: ["light.virtual_01", "sensor.temp_01"]
      responses:
        "200":
          description: Updated area
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Area"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Automations (rules)
  # ---------------------------------------------------------------------------
  /automations:
    get:
      operationId: listAutomations
      summary: List all automation rules
      tags: [automations]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Array of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"
    post:
      operationId: createAutomation
      summary: Create a new automation rule
      tags: [automations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleCreate"
      responses:
        "201":
          description: Created rule with server-assigned UUID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
    patch:
      operationId: bulkPatchAutomations
      summary: Bulk enable/disable automation rules
      description: |
        Enables or disables many rules at once and persists each changed rule
        back to its RON file.
        Requires the `automations:write` scope (`AutomationsWrite` guard).
        Target selection, in priority order:
          1. `ids` in the body — explicit list of rule UUIDs (the `?tag=` query
             param is ignored when `ids` is present).
          2. `?tag=<tag>` — every rule carrying that tag.
          3. Neither — **every rule in the system**.
        Rules generated from mode definitions are always skipped, even when
        explicitly listed in `ids`.
        `enabled` is optional: if omitted, the selected rules are re-serialized
        and returned unchanged.
      tags: [automations]
      security:
        - bearerAuth: []
      parameters:
        - name: tag
          in: query
          required: false
          schema:
            type: string
          description: |
            Apply only to rules carrying this tag. Ignored when `ids` is present
            in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  description: |
                    Explicit rule UUIDs to update. Overrides `?tag=`. Omit to
                    select by tag, or to select all rules.
                  items:
                    type: string
                    format: uuid
                enabled:
                  type: boolean
                  description: New enabled state for every selected rule
            example:
              ids:
                - 6f2f1a3e-6b1f-4f0c-9a7e-3b6b0a2d1c44
              enabled: false
      responses:
        "200":
          description: Bulk patch applied
          content:
            application/json:
              schema:
                type: object
                required: [updated, rules]
                properties:
                  updated:
                    type: integer
                    description: Number of rules selected and written
                  rules:
                    type: array
                    description: The updated rules, in their post-patch form
                    items:
                      $ref: "#/components/schemas/Rule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: A selected rule failed to compile against the device registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Rule engine not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /automations/import:
    post:
      operationId: importAutomations
      summary: Import rules from a JSON array (assigns fresh UUIDs to each)
      tags: [automations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Rule"
      responses:
        "200":
          description: Array of imported rules with new UUIDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"

  /automations/export:
    get:
      operationId: exportAutomations
      summary: Export all rules as a JSON array (suitable for re-import)
      tags: [automations]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All rules as a JSON array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rule"

  /automations/{id}:
    get:
      operationId: getAutomation
      summary: Get a single automation rule
      tags: [automations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AutomationId"
      responses:
        "200":
          description: Rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: replaceAutomation
      summary: Replace an automation rule (full update)
      tags: [automations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AutomationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleCreate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: patchAutomation
      summary: Update enabled state and/or priority only
      tags: [automations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AutomationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                priority:
                  type: integer
            example:
              enabled: false
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteAutomation
      summary: Delete an automation rule
      tags: [automations]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AutomationId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /automations/{id}/test:
    post:
      operationId: testAutomation
      summary: Dry-run a rule — evaluate conditions and return would-fire actions without executing them
      tags: [automations]
      security:

# Deck Door Opened (Any) — Night Lights
#
# When any deck door opens: mark the virtual switch as open.
# If mode_night is active, cancel the deck-lights-off timer and
# activate the deck-on scene so the lights come on immediately.

id       = "842b2dc5-140b-471f-b459-ca8a773542bc"
name     = "Deck Door Opened (Any) — Night Lights"
enabled  = true
priority = 20

[trigger]
type       = "device_state_changed"
device_id  = "yolink_d88b4c01000e813f"
device_ids = [
    "yolink_d88b4c01000e8304",
    "yolink_d88b4c01000e82eb",
    "yolink_d88b4c0200142eb8",
]
attribute  = "open"
to         = true

[[actions]]
type      = "set_device_state"
device_id = "switch_any_deck_door_open"
state     = { on = true }

[[actions]]
type      = "conditional"
condition = 'device_state("mode_night")["on"] == true'

[[actions.then_actions]]
type      = "set_device_state"
device_id = "timer_deck_lights_off"
state     = { command = "cancel" }

[[actions.then_actions]]
type      = "set_device_state"
device_id = "lutron_scene_deck_on_phantom"
state     = { activate = true }

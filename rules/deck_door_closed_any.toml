# All Deck Doors Closed — Start Lights Timer
#
# When any deck door closes and ALL four are now closed, and it's nighttime,
# start a 5-minute timer to turn off the deck lights.

id       = "4ad53081-5c15-465b-8d31-5ec97b289d12"
name     = "All Deck Doors Closed — Start Lights Timer"
enabled  = true
priority = 20

[trigger]
type       = "device_state_changed"
device_id  = "yolink_d88b4c01000e813f"
device_ids = [
    "yolink_d88b4c01000e8304",
    "yolink_d88b4c01000e82eb",
    "yolink_d88b4c0200142eb8",
]
attribute = "open"
to        = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e813f"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e8304"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e82eb"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c0200142eb8"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type    = "mode_is"
mode_id = "mode_night"
on      = true

[[actions]]
type      = "set_device_state"
device_id = "timer_deck_lights_off"

[actions.state]
command       = "start"
duration_secs = 300
label         = "Deck lights off"

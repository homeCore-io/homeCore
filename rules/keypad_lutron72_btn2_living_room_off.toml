# Keypad lutron_72 Button 2 — Living Room Tower Lamp Off
#
# When button 2 is pressed and the lamp is currently on,
# turn off the Hue light and clear the keypad button LED.

id = "fc0cfe30-1174-47e5-b04c-ec4c9fbc34ed"
name     = "Keypad lutron_72 Btn2 - Living Room Off"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_2"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_light_03113f8a_204d_4887_b9a0_00d385620886"
attribute = "on"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_light_03113f8a_204d_4887_b9a0_00d385620886"
state     = { on = false }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 2, state = 0 } }

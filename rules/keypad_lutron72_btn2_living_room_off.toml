# Keypad lutron_72 Button 1 — Living Room On
#
# When button 1 is pressed and the living room group is currently off,
# turn on the Hue group and light the keypad button LED.

id = "2b3e325b-5f72-4daa-84e0-d3b9d263d396"
name     = "Keypad lutron_72 Btn2 - Living Room On"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_2"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_zigbee_connectivity_facc901a_0b6f_4468_a559_65a4c99e4c85"
attribute = "on"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_zigbee_connectivity_facc901a_0b6f_4468_a559_65a4c99e4c85"
state     = { on = true }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 2, state = 1 } }

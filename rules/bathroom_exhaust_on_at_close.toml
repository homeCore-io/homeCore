# Bathroom - Exhaust On at Close
#
# Turn on the bathroom exhaust fan whenever the door closes, regardless of
# time of day.

id       = "ba000001-0003-0003-0003-000000000003"
name     = "Bathroom - Exhaust On at Close"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "yolink_d88b4c0400064299"
attribute = "open"

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c0400064299"
attribute = "open"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "lutron_21"

[actions.state]
on = true

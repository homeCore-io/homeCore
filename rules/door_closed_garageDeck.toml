# All Deck Doors Closed - Garage Deck trigger
#
# When the garage deck door closes, check if all 4 deck doors are now
# closed.  If so, turn off the any-deck-door-open virtual switch.

id = "70669e2d-3780-4ec8-80b0-593729699f9a"
name     = "All Deck Doors Closed - Garage Deck"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "yolink_d88b4c01000e82eb"
attribute = "open"
to        = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e813f"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e8304"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e82eb"
attribute = "open"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c0200142eb8"
attribute = "open"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "switch_any_deck_door_open"
state     = { on = false }

# Thermostat Away Mode
#
# When the /presence/away webhook is called, set the thermostat to away mode
# — but only if it is not already in away mode (Rhai script condition).
#
# Trigger: WebhookReceived — fires when POST /api/v1/webhooks/presence/away
#          is called (e.g. from a geofencing app or phone shortcut).
#
# To trigger manually:
#   curl -X POST http://homecore:8080/api/v1/webhooks/presence/away

id       = "a1b2c3d4-0004-0004-0004-000000000004"
name     = "Thermostat Away Mode"
enabled  = false
priority = 5

[trigger]
type = "webhook_received"
path = "presence/away"

[[conditions]]
type   = "script_expression"
script = """
  let mode = state("climate.main_thermostat", "mode");
  mode != "away"
"""

[[actions]]
type       = "call_service"
url        = "http://thermostat.local/api/mode"
method     = "POST"
timeout_ms = 5000
retries    = 2

[actions.body]
mode        = "away"
temperature = 62

[[actions]]
type       = "fire_event"
event_type = "home_mode_changed"

[actions.payload]
mode = "away"

# Movie Mode
#
# Activated by calling POST /api/v1/webhooks/scene/movie or via the API test
# endpoint.  Dims the living room lights and turns on the TV backlight
# simultaneously using a Parallel action group.
#
# Trigger: ManualTrigger — never fires automatically; use the test endpoint
#          or a webhook to activate:
#   curl -X POST http://homecore:8080/api/v1/automations/<id>/test

id       = "a1b2c3d4-0005-0005-0005-000000000005"
name     = "Movie Mode"
enabled  = false
priority = 10

[trigger]
type = "manual_trigger"

[[actions]]
type = "parallel"

[[actions.actions]]
type      = "set_device_state"
device_id = "light.living_room"

[actions.actions.state]
on         = true
brightness = 30
color_temp = 2700

[[actions.actions]]
type      = "set_device_state"
device_id = "switch.tv_backlight"

[actions.actions.state]
on = true

[[actions.actions]]
type      = "set_device_state"
device_id = "light.hallway"

[actions.actions.state]
on = false

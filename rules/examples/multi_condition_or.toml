# Multiple Conditions — OR Logic
#
# CONCEPT: The engine evaluates all [[conditions]] with AND logic natively.
# To express OR, collapse the alternatives into a single ScriptExpression
# condition written in Rhai.  The script must return a boolean.
#
# device_state("device_id") returns a map of the device's current attributes.
# Access individual attributes with ["attribute_name"].
#
# EXAMPLE: Office air quality alert — turn on the exhaust fan if temperature
# is too high OR humidity is too high.  Either condition alone is enough;
# we do not need both to be true at the same time.
#
# Rhai OR expression:
#   device_state("sensor.office_th")["temperature"] > 78.0
#   ||
#   device_state("sensor.office_th")["humidity_pct"] > 75.0
#
# TIP: ScriptExpression can combine any number of device states and attributes
# into arbitrarily complex boolean logic.  Use it whenever the built-in
# DeviceState condition (which is always AND) is too restrictive.

id       = "a1b2c3d4-0012-0012-0012-000000000012"
name     = "Multi-Condition OR — Office Air Quality Exhaust"
enabled  = false
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "sensor.office_th"

# Single ScriptExpression condition that encodes the OR.
# The rule fires if temperature exceeds 78 °F OR humidity exceeds 75 %.
[[conditions]]
type   = "script_expression"
script = """
  let t = device_state("sensor.office_th")["temperature"];
  let h = device_state("sensor.office_th")["humidity_pct"];
  t > 78.0 || h > 75.0
"""

[[actions]]
type      = "set_device_state"
device_id = "switch.office_exhaust"

[actions.state]
on = true

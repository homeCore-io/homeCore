# Morning Lights
#
# Turns on kitchen and hallway lights at 7 AM on weekdays.
# Trigger: TimeOfDay — fires at the specified time on selected days.

id       = "a1b2c3d4-0001-0001-0001-000000000001"
name     = "Morning Lights"
enabled  = false   # set true to activate
priority = 10

[trigger]
type = "time_of_day"
time = "07:00:00"
days = ["Mon", "Tue", "Wed", "Thu", "Fri"]

[[actions]]
type      = "set_device_state"
device_id = "light.kitchen_main"

[actions.state]
on         = true
brightness = 220
color_temp = 3000

[[actions]]
type      = "set_device_state"
device_id = "light.hallway"

[actions.state]
on         = true
brightness = 180

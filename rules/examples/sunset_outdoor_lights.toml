# Sunset Outdoor Lights
#
# Turns on outdoor lights 15 minutes before sunset.
# Solar time is computed locally from the lat/lon in homecore.toml — no cloud
# dependency.  The exact time shifts each day as the season changes.
#
# Trigger: SunEvent — fires at the computed solar event time + offset.

id       = "a1b2c3d4-0003-0003-0003-000000000003"
name     = "Sunset Outdoor Lights"
enabled  = false
priority = 15

[trigger]
type           = "sun_event"
event          = "sunset"
offset_minutes = -15   # negative = before sunset

[[actions]]
type      = "set_device_state"
device_id = "light.front_porch"

[actions.state]
on = true

[[actions]]
type      = "set_device_state"
device_id = "light.back_deck"

[actions.state]
on = true

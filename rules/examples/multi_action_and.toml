# Multiple Actions — AND Conditions (strict gate, all actions still fire)
#
# CONCEPT: AND conditions create a strict gate — every [[conditions]] block
# must pass or no actions run at all.  When the gate opens, ALL listed actions
# fire.  This is the default behavior; there is no per-action condition.
#
# This file demonstrates AND-style gating: three conditions must all be true
# before the action list executes.  Once they are, all four actions fire.
#
# EXAMPLE: Away-mode lockdown — when the last person leaves (presence clears),
# AND it is after 08:00 (not a false alarm from a short errand), AND the
# security switch is enabled → lock the door, turn off all lights, lower the
# thermostat, and send a departure notification.
#
# All four actions fire together; you cannot gate individual actions differently.
# If you need conditional per-action logic, split into multiple rules or use
# a ScriptExpression action (RunScript) for branching inside the action.

id       = "a1b2c3d4-0015-0015-0015-000000000015"
name     = "Multi-Action AND — Away Mode Lockdown"
enabled  = false
priority = 20

[trigger]
type      = "device_state_changed"
device_id = "sensor.presence_home"
attribute = "occupied"

# Condition A: presence sensor now shows nobody home.
[[conditions]]
type      = "device_state"
device_id = "sensor.presence_home"
attribute = "occupied"
op        = "eq"
value     = false

# Condition B: time is after 08:00 — avoids false lockdowns from quick
# morning errands or dogs triggering the sensor at night.
[[conditions]]
type  = "time_window"
start = "08:00:00"
end   = "23:00:00"

# Condition C: security mode is enabled — user has opted in to auto-lockdown.
# AND with A and B — all three must be true before any action fires.
[[conditions]]
type      = "device_state"
device_id = "switch.security_mode"
attribute = "on"
op        = "eq"
value     = true

# Action 1: lock the front door.
[[actions]]
type      = "set_device_state"
device_id = "lock.front_door"

[actions.state]
locked = true

# Action 2: turn off all lights via a scene-style bulk command.
[[actions]]
type      = "set_device_state"
device_id = "light.all_zones"

[actions.state]
on = false

# Action 3: set the thermostat to energy-saving away temperature.
[[actions]]
type      = "set_device_state"
device_id = "thermostat.main"

[actions.state]
mode        = "away"
target_temp = 65

# Action 4: send departure confirmation.
[[actions]]
type    = "notify"
channel = "pushover"
title   = "Home Secured"
message = "Away mode activated: door locked, lights off, thermostat set to 65°."

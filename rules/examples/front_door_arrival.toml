# Front Door Arrival Lights
#
# When the front door contact sensor opens in the evening, turn on the
# entryway light, send a Pushover notification, then turn the light off
# after 5 minutes.
#
# Trigger: DeviceStateChanged — fires when any attribute of the sensor changes.
# Conditions:
#   1. TimeWindow — only active 6 PM – 11:30 PM.
#   2. DeviceState — only when the contact attribute becomes true (open).

id       = "a1b2c3d4-0002-0002-0002-000000000002"
name     = "Front Door Arrival Lights"
enabled  = false
priority = 20

[trigger]
type      = "device_state_changed"
device_id = "sensor.front_door"
attribute = "contact"

[[conditions]]
type  = "time_window"
start = "18:00:00"
end   = "23:30:00"

[[conditions]]
type      = "device_state"
device_id = "sensor.front_door"
attribute = "contact"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "light.entryway"

[actions.state]
on         = true
brightness = 255

[[actions]]
type    = "notify"
channel = "pushover"
title   = "Arrival"
message = "Front door opened"

[[actions]]
type        = "delay"
duration_ms = 300000   # 5 minutes

[[actions]]
type      = "set_device_state"
device_id = "light.entryway"

[actions.state]
on = false

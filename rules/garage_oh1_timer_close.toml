# Garage OH1 - Timer Close
#
# When the auto-close timer fires: if the auto-close virtual switch is on
# and the door is still open, activate the scene to close the door.

id       = "8b49464c-2d17-4150-a10f-c6918ac669c0"
name     = "Garage OH1 - Timer Close"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "timer_garage_close"
attribute = "state"

[[conditions]]
type      = "device_state"
device_id = "timer_garage_close"
attribute = "state"
op        = "eq"
value     = "finished"

[[conditions]]
type      = "device_state"
device_id = "switch_auto_garage_door"
attribute = "on"
op        = "eq"
value     = true

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000cf2e5"
attribute = "open"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "lutron_scene_oh1_door_phantom"

[actions.state]
activate = true

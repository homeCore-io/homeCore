# Bathroom - Timer Fires, Exhaust Off
#
# When the 5-minute bathroom exit timer fires, turn off the exhaust fan.

id       = "ba000001-0005-0005-0005-000000000005"
name     = "Bathroom - Timer Fires, Exhaust Off"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "timer_bathroom"
attribute = "state"

[[conditions]]
type      = "device_state"
device_id = "timer_bathroom"
attribute = "state"
op        = "eq"
value     = "fired"

[[actions]]
type      = "set_device_state"
device_id = "lutron_21"

[actions.state]
on = false

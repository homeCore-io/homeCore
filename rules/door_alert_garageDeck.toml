# Garage Deck Door - Open Too Long Alert
#
# Fires when the deck door is still open after 10 minutes.
# Trigger re-evaluates on every YoLink heartbeat while the door stays open,
# so the alert repeats every heartbeat cycle (~15–30 min) until the door closes.
# This rule is the first live use of the TimeElapsed condition.

id = "8cfce1c4-a7f3-497c-9c9e-bb4b371b4d48"
name     = "Door Alert - Garage Deck Open 10min"
enabled  = false
priority = 5
tags     = ["deck", "door-alerts"]

[trigger]
type      = "device_state_changed"
device_id = "yolink_d88b4c01000e82eb"
attribute = "open"
to        = true

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e82eb"
attribute = "open"
op        = "eq"
value     = true

[[conditions]]
type          = "time_elapsed"
device_id     = "yolink_d88b4c01000e82eb"
attribute     = "open"
duration_secs = 600

[[actions]]
type    = "notify"
channel = "telegram"
message = "Garage deck door has been open for 10+ minutes"

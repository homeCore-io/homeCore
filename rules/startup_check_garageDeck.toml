# Garage Deck Door - Startup Open Check
#
# Fires once at startup if the deck door was already open when homeCore
# started.  Without this rule, DeviceStateChanged triggers never re-fire
# for state that existed before the restart, so the door-alert rules would
# be silent until the door is closed and reopened.
#
# Pattern: SystemStarted + DeviceState(open eq true) → Telegram notify

id = "14111fa1-2889-4a6b-9eef-ccef4179435e"
name     = "Startup Check - Garage Deck Door Open"
enabled  = false
priority = 5
tags     = ["deck", "door-alerts", "startup"]

[trigger]
type = "system_started"

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000e82eb"
attribute = "open"
op        = "eq"
value     = true

[[actions]]
type    = "notify"
channel = "telegram"
message = "Garage deck door was open when homeCore started"

# Keypad lutron_72 Button 2 — Living Room Tower Lamp On
#
# When button 2 is pressed and the lamp is currently off,
# turn on the Hue light and light the keypad button LED.

id = "2b3e325b-5f72-4daa-84e0-d3b9d263d396"
name     = "Keypad lutron_72 Btn2 - Living Room On"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_2"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_light_03113f8a_204d_4887_b9a0_00d385620886"
attribute = "on"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_light_03113f8a_204d_4887_b9a0_00d385620886"
state     = { on = true }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 2, state = 1 } }

# Keypad lutron_72 Button 1 — Living Room On
#
# When button 1 is pressed and the living room group is currently off,
# turn on the Hue group and light the keypad button LED.

id = "dba5d032-b5c3-4ea2-9647-307419d2b556"
name     = "Keypad lutron_72 Btn4 - Living Room On"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_4"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_zigbee_connectivity_c65723c5_819f_4e53_bf62_be12cc0e8942"
attribute = "on"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_zigbee_connectivity_c65723c5_819f_4e53_bf62_be12cc0e8942"
state     = { on = true }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 4, state = 1 } }

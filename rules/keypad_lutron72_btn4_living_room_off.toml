# Keypad lutron_72 Button 1 — Living Room On
#
# When button 1 is pressed and the living room group is currently off,
# turn on the Hue group and light the keypad button LED.

id = "478aa7db-f162-4f79-a492-36e2d407ed0f"
name     = "Keypad lutron_72 Btn4 - Living Room Off"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_4"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_light_51b2e6bc_3197_4206_a0f0_c6838d3e1158"
attribute = "on"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_light_51b2e6bc_3197_4206_a0f0_c6838d3e1158"
state     = { on = false }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 4, state = 0 } }

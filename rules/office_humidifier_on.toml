# Office Humidifier On
#
# When the office desk sensor reports humidity below 35%, turn on the
# humidifier plug — but only if it is not already on.
#
# Replace SENSOR_DEVICE_ID with the actual yolink_* id from:
#   curl -s http://localhost:8080/api/v1/devices | jq '.[] | select(.name | test("desk"; "i")) | {id,name}'

id       = "e1000001-0001-0001-0001-000000000001"
name     = "Office Humidifier On"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "yolink_d88b4c01000d458f"
attribute = "humidity_pct"

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000d458f"
attribute = "humidity_pct"
op        = "lt"
value     = 35.0

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c0100044441"
attribute = "on"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "yolink_d88b4c0100044441"

[actions.state]
on = true

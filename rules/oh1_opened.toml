# Garage OH1 - Door Opens
#
# When the OH1 garage door opens: turn on the overhead light and activate the
# outside-on scene simultaneously, then start a 10-minute close timer.

id = "534b8117-c31e-4f8d-acdb-9cfc2d66aefc"
name     = "Garage OH1 - Door Opens"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "yolink_d88b4c01000cf2e5"
attribute = "open"
to        = true

[[actions]]
type = "parallel"
actions = [
  { type = "set_device_state", device_id = "lutron_54", state = { on = true } },
  { type = "set_device_state", device_id = "timer_garage_close", state = { command = "start", duration_secs = 600, label = "Garage OH1 auto-close" } }
]


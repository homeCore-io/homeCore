# Keypad lutron_72 Button 1 — Living Room On
#
# When button 1 is pressed and the living room group is currently off,
# turn on the Hue group and light the keypad button LED.

id = "57d7da0a-6cf7-41de-8bad-9477de8cd971"
name     = "Keypad lutron_72 Btn3 - Living Room On"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_3"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_zigbee_connectivity_526f8d77_83a5_4b5a_8948_bf15e3e37321"
attribute = "on"
op        = "eq"
value     = false

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_zigbee_connectivity_526f8d77_83a5_4b5a_8948_bf15e3e37321"
state     = { on = true }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 3, state = 1 } }

# Garage OH1 - Timer Close (day)
#
# When the auto-close timer fires during the day: if the auto-close virtual
# switch is on and the door is still open, activate the scene to close it.
# Night variant (oh1_timer_close_night.toml) also turns off outside lights.

id       = "8b49464c-2d17-4150-a10f-c6918ac669c0"
name     = "Garage OH1 - Timer Close"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "timer_garage_close"
attribute = "state"
to        = "finished"

[[conditions]]
type      = "device_state"
device_id = "mode_night"
attribute = "on"
op        = "eq"
value     = false

[[conditions]]
type      = "device_state"
device_id = "switch_auto_garage_door"
attribute = "on"
op        = "eq"
value     = true

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000cf2e5"
attribute = "open"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "lutron_scene_oh1_door_phantom"
state     = { activate = true }

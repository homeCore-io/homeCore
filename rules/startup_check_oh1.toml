# Garage OH1 Door - Startup Open Check
#
# Fires once at startup if the OH1 overhead door was already open when
# homeCore started.  Complements door_alert_oh1.toml which requires a
# DeviceStateChanged event to trigger.

id = "45c2d019-9ce4-422b-9186-3d8c21faaa73"
name     = "Startup Check - OH1 Door Open"
enabled  = true
priority = 5
tags     = ["garage", "door-alerts", "startup"]

[trigger]
type = "system_started"

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000cf2e5"
attribute = "open"
op        = "eq"
value     = true

#[[actions]]
#type    = "notify"
#channel = "telegram"
#message = "Garage door (OH1) was open when homeCore started"

[[actions]]
type      = "set_device_state"
device_id = "timer_garage_close"

[actions.state]
command       = "start"
duration_secs = 600

# Garage OH1 Door - Open Too Long Alert
#
# Fires when the 10-minute auto-close timer expires and the door is still open.
# Piggybacks on timer_garage_close (same timer the close rules use) so no
# separate timer device is needed.  Sends a Telegram alert regardless of
# whether the auto-close switch is on — you want to know either way.

id = "841818bd-f732-46df-bbb3-5c444f97846f"
name     = "Door Alert - OH1 Open 10min"
enabled  = false
priority = 5
tags     = ["garage", "door-alerts"]

[trigger]
type      = "device_state_changed"
device_id = "timer_garage_close"
attribute = "state"
to        = "finished"

[[conditions]]
type      = "device_state"
device_id = "yolink_d88b4c01000cf2e5"
attribute = "open"
op        = "eq"
value     = true

[[actions]]
type    = "notify"
channel = "telegram"
message = "Garage door (OH1) has been open for 10+ minutes"

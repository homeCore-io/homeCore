# Keypad lutron_72 Button 6 — Living Room Off
#
# When button 6 is pressed and the living room group is currently on,
# turn off the Hue group and clear the keypad button LED.

id       = "12c084ab-f8f3-4271-a96d-97ac7560895c"
name     = "Keypad lutron_72 Btn6 - Living Room Off"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_6"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_group_f891081e_3da3_49ac_a504_3cfd558b970e"
attribute = "on"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_group_f891081e_3da3_49ac_a504_3cfd558b970e"
state     = { on = false }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 1, state = 0 } }

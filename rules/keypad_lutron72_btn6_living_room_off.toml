# Keypad lutron_72 Button 1 — Living Room Off
#
# When button 1 is pressed and the living room group is currently on,
# turn off the Hue group and clear the keypad button LED.

id = "9d3596f0-e987-4a92-b709-5d9248e041d8"
name     = "Keypad lutron_72 Btn1 - Living Room Off"
enabled  = true
priority = 10

[trigger]
type      = "device_state_changed"
device_id = "lutron_72"
attribute = "button_1"
to        = "press"

[[conditions]]
type      = "device_state"
device_id = "hue_001788fffe6841b3_group_f891081e_3da3_49ac_a504_3cfd558b970e"
attribute = "on"
op        = "eq"
value     = true

[[actions]]
type      = "set_device_state"
device_id = "hue_001788fffe6841b3_group_f891081e_3da3_49ac_a504_3cfd558b970e"
state     = { on = false }

[[actions]]
type      = "set_device_state"
device_id = "lutron_72"
state     = { set_led = { button = 1, state = 0 } }

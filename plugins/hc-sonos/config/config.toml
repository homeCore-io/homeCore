[homecore]
broker_host = "127.0.0.1"
broker_port = 1883
plugin_id   = "plugin.sonos"
# password  = ""

[sonos]
discovery_interval_secs  = 60   # how often to re-run SSDP scan
poll_interval_secs        = 5    # how often to poll each speaker for state
discovery_timeout_secs    = 5    # SSDP scan duration
# manual_hosts = ["192.168.1.50", "192.168.1.51"]

# Optional: pre-configure specific speakers.
# Any speaker found via SSDP that is NOT listed here is auto-registered
# with hc_id = "sonos_{sanitized_room_name}" and no area.


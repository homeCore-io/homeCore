# http-poller.example.toml — HomeCore HTTP Poller configuration reference
#
# Copy to http-poller.toml, fill in your details, and run:
#   cargo run -p http-poller -- --config http-poller.toml
#   HC_CONFIG=/etc/homecore/poller.toml http-poller
#
# Each [[poller]] block defines one HomeCore device fed by one HTTP endpoint.
# Response data is mapped to device attributes in one of three ways:
#   1. transform   — Rhai script (most flexible; supports arithmetic, logic)
#   2. field_map   — dot-notation path extraction (simple and readable)
#   3. raw         — publish the full JSON response body as-is (no mapping needed)
# If both transform and field_map are set, transform wins.

# ---------------------------------------------------------------------------
# Plugin identity and MQTT broker connection
# ---------------------------------------------------------------------------
[plugin]
id          = "plugin.http-poller"
broker_host = "127.0.0.1"
broker_port = 1883
password    = ""               # leave empty for dev; set for ACL-protected brokers

# ===========================================================================
# Example 1 — OpenWeatherMap (field_map)
#
# Free API key: https://openweathermap.org/api
# Response shape: { "main": { "temp": 21.3, "humidity": 55, ... },
#                   "weather": [{ "description": "clear sky" }],
#                   "wind": { "speed": 3.2 }, "clouds": { "all": 10 } }
# ===========================================================================
[[poller]]
device_id     = "sensor.outdoor_weather"
name          = "Outdoor Weather"
url           = "https://api.openweathermap.org/data/2.5/weather?q=London,UK&units=metric&appid=YOUR_API_KEY"
interval_secs = 300        # 5 minutes — respect the free-tier rate limit
timeout_secs  = 10

[poller.capabilities]
temperature  = { type = "number", unit = "°C" }
feels_like   = { type = "number", unit = "°C" }
humidity     = { type = "integer", unit = "%" }
pressure     = { type = "integer", unit = "hPa" }
wind_speed   = { type = "number", unit = "m/s" }
description  = { type = "string" }
clouds_pct   = { type = "integer", unit = "%" }

# target_attr = "path.in.response.json"
# Supports nested keys (a.b.c) and array indexing (arr[0].field)
[poller.field_map]
temperature  = "main.temp"
feels_like   = "main.feels_like"
humidity     = "main.humidity"
pressure     = "main.pressure"
wind_speed   = "wind.speed"
description  = "weather[0].description"
clouds_pct   = "clouds.all"

# ===========================================================================
# Example 2 — Local REST sensor with authentication header
#
# Any smart device / NAS / service exposing a JSON status endpoint.
# ===========================================================================
[[poller]]
device_id     = "sensor.garage_env"
name          = "Garage Environment"
url           = "http://192.168.1.55/api/sensors/current"
interval_secs = 60
timeout_secs  = 5

[poller.headers]
"Authorization" = "Bearer my-secret-api-token"
"Accept"        = "application/json"

[poller.capabilities]
temperature = { type = "number", unit = "°C" }
humidity    = { type = "number", unit = "%" }
door_open   = { type = "boolean" }

[poller.field_map]
temperature = "temp_c"
humidity    = "humidity_pct"
door_open   = "garage.door.open"

# ===========================================================================
# Example 3 — Complex transform with Rhai
#
# Use transform when field_map isn't expressive enough: arithmetic,
# conditionals, percentage calculations, string manipulation.
#
# The `response` variable contains the full parsed JSON response as a Rhai map.
# The script must evaluate to a map literal (#{ ... }) — that becomes the
# device state published to HomeCore.
# ===========================================================================
[[poller]]
device_id     = "sensor.nas_status"
name          = "NAS Status"
url           = "http://192.168.1.100:5000/api/v2/system"
interval_secs = 30
timeout_secs  = 8

[poller.headers]
"X-API-Key" = "nas-api-key-here"

[poller.capabilities]
cpu_temp_c      = { type = "number", unit = "°C" }
disk_used_pct   = { type = "number", unit = "%" }
memory_used_pct = { type = "number", unit = "%" }
uptime_hours    = { type = "number" }
status          = { type = "string" }

# `response` is in scope as a Rhai map.  Script must return a map.
transform = """
    let disk_used  = response["storage"]["used_bytes"].to_float();
    let disk_total = response["storage"]["total_bytes"].to_float();
    let disk_pct   = if disk_total > 0.0 { (disk_used / disk_total) * 100.0 } else { 0.0 };

    let mem_used   = response["memory"]["used_mb"].to_float();
    let mem_total  = response["memory"]["total_mb"].to_float();
    let mem_pct    = if mem_total > 0.0 { (mem_used / mem_total) * 100.0 } else { 0.0 };

    #{
        "cpu_temp_c":      response["cpu"]["temperature"],
        "disk_used_pct":   disk_pct,
        "memory_used_pct": mem_pct,
        "uptime_hours":    response["uptime_seconds"].to_float() / 3600.0,
        "status":          response["health"]["status"],
    }
"""

# ===========================================================================
# Example 4 — Temperature conversion in transform (Kelvin → Celsius)
#
# Some APIs return values in units that need converting.
# ===========================================================================
[[poller]]
device_id     = "sensor.boiler_temp"
name          = "Boiler Temperature"
url           = "http://192.168.1.88/sensor/temperature"
interval_secs = 15
timeout_secs  = 3

[poller.capabilities]
temp_c  = { type = "number", unit = "°C" }
setpoint_c = { type = "number", unit = "°C" }

transform = """
    let raw_k    = response["temperature_kelvin"].to_float();
    let set_k    = response["setpoint_kelvin"].to_float();
    #{
        "temp_c":     raw_k - 273.15,
        "setpoint_c": set_k - 273.15,
    }
"""

# ===========================================================================
# Example 5 — Raw passthrough
#
# No field_map or transform: the full JSON response body is published directly
# as the device state.  Ideal for endpoints that already return a flat
# attribute map compatible with HomeCore.
# ===========================================================================
# [[poller]]
# device_id     = "sensor.custom_flat_device"
# name          = "Custom Device"
# url           = "http://192.168.1.200/state"
# interval_secs = 20
#
# [poller.capabilities]
# on    = { type = "boolean" }
# value = { type = "number" }

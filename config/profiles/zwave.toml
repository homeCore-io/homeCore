# HomeCore Ecosystem Profile — ZWave-JS (via ZwaveJS UI)
#
# Prerequisites:
#   - ZwaveJS UI running with MQTT enabled and pointing at the HomeCore broker
#   - MQTT prefix set to "zwave" in ZwaveJS UI Settings → MQTT
#   - "Use nodes name instead of numeric nodeId" set to OFF (use numeric IDs)
#
# Device IDs in HomeCore:
#   zwave/{nodeId}/...  →  "zwave_{nodeId}"  (e.g. zwave_5)
#
# How it works:
#   Inbound: each Z-Wave value arrives as a separate MQTT topic. A 100 ms
#   debounce buffer merges per-attribute updates into a single state event.
#   Attribute names are resolved via the CC alias table below.
#
#   Outbound: commands fan-out — one MQTT publish per attribute in the cmd
#   payload, routed via the alias_reverse map to the correct CC/endpoint/set topic.
#
# Finding topic formats for your specific devices:
#   mosquitto_sub -h <broker> -t 'zwave/#' -v
#   Watch what topics your nodes publish on inclusion/value change, then add
#   entries to [ecosystem.attribute_aliases] below.

[ecosystem]
name         = "zwave"
description  = "ZWave-JS via ZwaveJS UI"
prefix       = "zwave_"
aggregate_ms = 100               # debounce window (ms) for per-attribute bursts

# ---------------------------------------------------------------------------
# Attribute alias table
#
# Maps "{commandClass}/{endpoint}/{property}" → HomeCore canonical attribute.
# For CCs that include a propertyKey segment (e.g. Meter CC 50), the key is
# "{commandClass}/{endpoint}/{property}/{propertyKey}".
#
# For write-capable attributes, define the targetValue alias AFTER the
# currentValue alias — the reverse map sorts keys alphabetically so
# "targetValue" (t > c) overwrites "currentValue" as the write target.
#
# Property names come directly from the Z-Wave spec via zwave-js. Names with
# spaces (e.g. "Air temperature") must be quoted in TOML.
# ---------------------------------------------------------------------------

[ecosystem.attribute_aliases]

# Binary Sensor (CC 48) — read-only contact/motion/leak/alarm sensors.
# Property names match what zwave-js reports. Add device-specific names as needed.
"48/0/Motion Detector Status"     = "motion"
"48/0/Door/Window Status"         = "contact_open"
"48/0/Water Leak Status"          = "water_detected"
"48/0/Smoke Alarm Status"         = "smoke"
"48/0/CO Alarm Status"            = "co"
"48/0/Vibration Detection Status" = "vibration"
"48/0/Tamper Alarm Status"        = "tamper"

# Binary Switch (CC 37) — on/off
"37/0/currentValue"              = "on"
"37/0/targetValue"               = "on"       # write target (comes after currentValue)

# Multilevel Switch / Dimmer (CC 38) — 0-99 brightness
"38/0/currentValue"              = "brightness"
"38/0/targetValue"               = "brightness"  # write target

# Multilevel Sensor (CC 49) — read-only sensor values
# Property names use spaces as defined in the Z-Wave spec / zwave-js.
"49/0/Air temperature"           = "temperature"
"49/0/Humidity"                  = "humidity"
"49/0/Luminance"                 = "illuminance"
"49/0/Ultraviolet"               = "uv_index"
"49/0/CO2 level"                 = "co2_ppm"
"49/0/Atmospheric pressure"      = "pressure"

# Meter (CC 50) — read-only energy/power monitoring
# ZwaveJS UI publishes Meter values as 6-segment topics:
#   zwave/{nodeId}/50/{endpoint}/value/{propertyKey}
# The propertyKey encodes meter type + scale. Common electric meter values:
#   65537 = Power (W), 65538 = Energy (kWh), 65539 = Voltage (V), 65540 = Current (A)
# These values can vary by zwave-js version. Run mosquitto_sub to find yours:
#   mosquitto_sub -h <broker> -t 'zwave/+/50/#' -v
"50/0/value/65537"               = "power_w"
"50/0/value/65538"               = "energy_kwh"
"50/0/value/65539"               = "voltage"
"50/0/value/65540"               = "current_a"

# Battery (CC 128)
"128/0/level"                    = "battery"
"128/0/isLow"                    = "battery_low"

# Door Lock (CC 98)
"98/0/currentMode"               = "locked"
"98/0/targetMode"                = "locked"   # write target

# Window Covering (CC 102)
"102/0/currentValue"             = "position"
"102/0/targetValue"              = "position"  # write target

# Color Switch (CC 51)
"51/0/currentColor"              = "color_rgb"
"51/0/targetColor"               = "color_rgb"  # write target

# Thermostat Setpoint (CC 67)
"67/1/value"                     = "target_temp"   # endpoint 1 = heating setpoint

# Thermostat Mode (CC 64)
"64/0/mode"                      = "mode"

# Thermostat Operating State (CC 66) — read-only
"66/0/state"                     = "hvac_action"

# Notification (CC 113) — binary sensors (read-only)
"113/0/Access Control"           = "locked"
"113/0/Home Security"            = "tamper"
"113/0/Smoke Alarm"              = "smoke"
"113/0/CO Alarm"                 = "co"
"113/0/Water Alarm"              = "water_detected"


# ---------------------------------------------------------------------------
# State topics
#
# IMPORTANT: Explicit CC-specific patterns are listed first. The router uses
# first-match semantics, so these override the generic wildcard patterns below
# for the CCs that need value coercion or translation.
#
# Two generic patterns handle all remaining ZwaveJS UI topic formats:
#
#   5-segment: zwave/{nodeId}/{CC}/{endpoint}/{property}
#     Used by most CCs (Binary Switch, Dimmer, Sensor, Battery, etc.)
#
#   6-segment: zwave/{nodeId}/{CC}/{endpoint}/{property}/{propertyKey}
#     Used by Meter CC (50) and any CC with a propertyKey sub-value.
#
# coerce_scalar = true auto-detects payload type:
#   "true"/"false" → bool, integer strings → i64, float strings → f64.
# ---------------------------------------------------------------------------

# Door Lock (CC 98) — currentMode/targetMode publish 0 (unsecured) or 255 (secured).
# coerce_scalar turns "255" → integer 255; nonzero_bool then maps to true/false.
[[ecosystem.state_topics]]
pattern       = "zwave/{nodeId}/98/{endpoint}/{property}"
attribute     = "locked"
coerce_scalar = true
coerce        = { "locked" = "nonzero_bool" }

# Thermostat Mode (CC 64) — publishes an integer mode index.
# value_map translates to canonical strings understood by rules and the TUI.
[[ecosystem.state_topics]]
pattern       = "zwave/{nodeId}/64/{endpoint}/{property}"
attribute     = "mode"
coerce_scalar = true
value_map     = { "0" = "off", "1" = "heat", "2" = "cool", "3" = "auto", "6" = "fan_only", "11" = "energy_heat" }

# Generic 5-segment — catches all other CCs.
[[ecosystem.state_topics]]
pattern       = "zwave/{nodeId}/{commandClass}/{endpoint}/{property}"
attribute     = "{property}"     # resolved via attribute_aliases; raw name as fallback
coerce_scalar = true

# Generic 6-segment — Meter CC (50) and CCs with a propertyKey sub-value.
[[ecosystem.state_topics]]
pattern       = "zwave/{nodeId}/{commandClass}/{endpoint}/{property}/{propertyKey}"
attribute     = "{property}/{propertyKey}"   # alias key: "{CC}/{ep}/{property}/{propertyKey}"
coerce_scalar = true


# ---------------------------------------------------------------------------
# Node name
#
# ZwaveJS UI publishes node metadata to zwave/{nodeId}/nodeInfo as a JSON
# object whenever a node's name or location changes (retained message).
# We extract only the "name" field so HomeCore's device display name tracks
# the node name set in ZwaveJS UI.
#
# partial = true — merges only the "name" attribute; does not replace
# any other device attributes captured from CC value topics.
# ---------------------------------------------------------------------------

[[ecosystem.state_topics]]
pattern   = "zwave/{nodeId}/nodeInfo"
partial   = true
field_map = { "name" = "name" }


# ---------------------------------------------------------------------------
# Availability
#
# ZwaveJS UI publishes node status to zwave/{nodeId}/status.
# Payload is a plain string: "alive", "sleep", or "dead".
# ---------------------------------------------------------------------------

[[ecosystem.availability_topics]]
pattern = "zwave/{nodeId}/status"

  [ecosystem.availability_topics.value_map]
  alive = true
  sleep = true    # sleeping battery devices are still reachable
  dead  = false


# ---------------------------------------------------------------------------
# Commands
#
# Each attribute in the cmd payload is published as a separate MQTT message
# to the Z-Wave set topic for that CC/endpoint/property, resolved via the
# alias_reverse map (the inverse of [ecosystem.attribute_aliases]).
#
# For write-capable attributes, "targetValue" aliases defined after
# "currentValue" win in the reverse map (alphabetical sort: t > c).
# ---------------------------------------------------------------------------

[[ecosystem.cmd_topics]]
source         = "homecore/devices/zwave_{nodeId}/cmd"
target_pattern = "zwave/{nodeId}/{commandClass}/{endpoint}/{property}/set"
routing        = "alias_reverse"
# cmd_value_map translates canonical HC values → native ZWave values before publish.
# Door Lock: true/false → 255/0 (ZWave secured/unsecured mode integers).
cmd_value_map  = { locked = { "true" = 255, "false" = 0 } }
